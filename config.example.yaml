# NeuraClaw V3 configuration.
# Copy to config.yaml and adjust. API keys go in .env, never here.

providers:
  nim:
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_API_KEY
  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
  ollama:
    base_url: http://localhost:11434/v1
    api_key_env: ""          # Ollama needs no key; literal "ollama" is sent

# Model roles. Each role is a failover chain of "provider/model" refs,
# tried in order. Subsystems request roles, never concrete models.
roles:
  primary:
    - openrouter/anthropic/claude-sonnet-4.6
    - nim/meta/llama-3.3-70b-instruct
  cheap:
    - nim/meta/llama-3.1-8b-instruct
  local:
    - ollama/qwen2.5
  # Vision-capable chain — used automatically when a chat carries an image
  # (the companion "looking at" your screen). Sonnet sees images over the
  # existing OpenRouter key; the Ollama fallback keeps sight fully local.
  vision:
    - openrouter/anthropic/claude-sonnet-4.6
    - ollama/llama3.2-vision

# Models known to NOT support tool calling. Router refuses tool-bearing
# requests to these instead of failing silently.
no_tools_models: []

server:
  host: 127.0.0.1
  port: 8090

trust:
  # Highest tool risk run without asking: 0=READ, 1=WRITE (workspace-scoped),
  # 2=EXECUTE (shell), 3=NETWORK_SENSITIVE. Approval flow arrives in Phase 2.
  max_auto_risk: 1
  # Named tools allowed to auto-run regardless of tier — a least-privilege
  # opt-in for safe, constrained actions. (run_shell is deliberately NOT here.)
  auto_approve_tools:
    - open_url
    - open_app
    - play_music
    - control_playback

# Local actions the companion may take (open_url / open_app tools).
actions:
  url_schemes: [http, https]   # never file:/javascript:/custom protocol handlers
  apps:                        # friendly name -> URI or executable on PATH
    spotify: "spotify:"        # e.g. add  notepad: notepad.exe

agent:
  max_steps: 20            # tool-call loop budget per turn
  history_messages: 40     # recent messages kept in context
  extract_memories: true   # cheap-model memory extraction after each turn
