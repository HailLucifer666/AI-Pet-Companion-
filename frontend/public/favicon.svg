<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="ember" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="oklch(89% 0.10 84)"/>
      <stop offset="55%" stop-color="oklch(73% 0.18 72)"/>
      <stop offset="100%" stop-color="oklch(54% 0.16 62)"/>
